name: Search bioRxiv for CAR-T and IHC

on:
  schedule:
    - cron: '0 12 * * *' # Runs automatically every day at 12:00 PM UTC
  workflow_dispatch: # This allows you to click a button to run it manually right now

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required library
        run: pip install requests

      - name: Run the script
        run: python search_biorxiv.py

      - name: Save the new CSV file back to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add car_t_ihc_papers.csv
          git commit -m "Auto-update paper list" || echo "No new papers or changes found"
          git push
